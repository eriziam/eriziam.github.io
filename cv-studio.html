<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CV Studio - Eryk Kirzanowski</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #080810; font-family: 'Sora', sans-serif; color: #e2e0f0; }
        .app { min-height: 100vh; display: flex; flex-direction: column; }
        .header { border-bottom: 1px solid #1c1c30; padding: 0 18px; display: flex; align-items: center; justify-content: space-between; height: 50px; background: #0a0a14; flex-wrap: wrap; gap: 10px; }
        .header-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #b09fff; }
        .shell { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 50px); }
        .sidebar { width: 200px; background: #0a0a14; border-right: 1px solid #1c1c30; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .nav-section { padding: 8px 0; border-bottom: 1px solid #1c1c30; }
        .nav-section:last-child { border-bottom: none; }
        .nav-label { padding: 4px 14px 6px; font-size: 10px; color: #3a3a5a; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; cursor: pointer; font-size: 12.5px; color: #6060a0; transition: all 0.12s; }
        .nav-item:hover { color: #b09fff; }
        .nav-item.active { background: #16162a; color: #b09fff; border-left: 2px solid #7c5cfc; font-weight: 600; }
        .editor { flex: 1; overflow-y: auto; padding: 18px 22px; background: #080810; }
        .preview { width: 400px; border-left: 1px solid #1c1c30; overflow-y: auto; background: #f4f3f0; padding: 24px; color: #1a1a2a; flex-shrink: 0; }
        .card { background: #0e0e1c; border: 1px solid #1c1c30; border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
        .inp { width: 100%; background: #080812; border: 1px solid #1c1c30; border-radius: 6px; padding: 8px 10px; color: #e2e0f0; font-size: 13px; outline: none; margin-bottom: 10px; font-family: 'Sora', sans-serif; }
        .inp:focus { border-color: #7c5cfc; }
        .lbl { font-size: 11px; color: #6060a0; margin-bottom: 3px; display: block; font-weight: 500; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row .inp { margin-bottom: 0; }
        .btn { padding: 8px 14px; border-radius: 6px; border: 1px solid #1c1c30; background: #14142a; color: #b09fff; font-size: 12px; font-weight: 600; cursor: pointer; margin-right: 8px; }
        .btn:hover { background: #1a1a40; }
        .btn-primary { background: #7c5cfc; color: #000; border: none; }
        .btn-primary:hover { background: #9585ff; }
        .btn-danger { border-color: #4a1a1a; color: #f87171; }
        .btn-danger:hover { background: #2a1010; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .section-header h3 { font-size: 11px; color: #6060a0; text-transform: uppercase; letter-spacing: 0.08em; }
        .preview-header { text-align: center; margin-bottom: 15px; }
        .preview-name { font-size: 20px; font-weight: 700; }
        .preview-title { font-size: 12px; color: #4a3aaa; margin-top: 2px; }
        .preview-contact { font-size: 10px; color: #666; margin-top: 4px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .preview-section { margin-top: 16px; }
        .preview-section-title { font-size: 10px; font-weight: 700; color: #4a3aaa; border-bottom: 1.5px solid #4a3aaa; padding-bottom: 2px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
        .preview-item { margin-bottom: 8px; }
        .preview-item-title { font-weight: 600; font-size: 11px; }
        .preview-item-sub { font-size: 10px; color: #4a3aaa; }
        .preview-item-date { font-size: 9.5px; color: #666; float: right; font-weight: 400; }
        .preview-text { font-size: 10px; color: #555; margin-top: 2px; }
        .preview-skills { font-size: 10px; }
        .preview-skills strong { color: #666; }
        .bullet-input { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .bullet-input input { flex: 1; }
        .bullet-input button { padding: 4px 8px; font-size: 10px; }
        .empty-msg { color: #3a3a5a; font-size: 12px; font-style: italic; }
        .back-link { position: fixed; top: 12px; left: 16px; color: #6060a0; z-index: 100; font-size: 13px; text-decoration: none; }
        .back-link:hover { color: #b09fff; }
        @media (max-width: 900px) { .shell { flex-direction: column; } .preview { width: 100%; border-left: none; border-top: 1px solid #1c1c30; } .sidebar { width: 100%; flex-direction: row; overflow-x: auto; border-right: none; border-bottom: 1px solid #1c1c30; } }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← Back to Site</a>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const uid = () => Math.random().toString(36).slice(2, 9);
        
        const EMPTY_CV = {
            personal: { name: "", title: "", email: "", phone: "", location: "", linkedin: "", github: "", website: "", summary: "" },
            experience: [],
            education: [],
            skills: { technical: [], tools: [], soft: [], other: [] },
            certifications: [],
            projects: [],
            languages: [],
            awards: [],
            volunteering: []
        };
        
        function CVStudio() {
            const [cv, setCV] = useState(() => {
                try { 
                    const s = localStorage.getItem("cvs3");
                    const parsed = s ? JSON.parse(s) : null;
                    if (parsed && (parsed.personal?.name || parsed.experience?.length > 0)) return parsed;
                    return EMPTY_CV;
                } catch { return EMPTY_CV; }
            });
            const [tab, setTab] = useState("personal");
            const [showPreview, setShowPreview] = useState(true);
            
            useEffect(() => { localStorage.setItem("cvs3", JSON.stringify(cv)); }, [cv]);
            
            const updateCV = (updates) => setCV(prev => ({ ...prev, ...updates }));
            
            const addExperience = () => setCV(c => ({ ...c, experience: [...c.experience, { id: uid(), company: "", role: "", start: "", end: "", current: false, location: "", bullets: [""] }] }));
            const removeExperience = (id) => setCV(c => ({ ...c, experience: c.experience.filter(e => e.id !== id) }));
            const updateExperience = (id, field, value) => setCV(c => ({ ...c, experience: c.experience.map(e => e.id === id ? { ...e, [field]: value } : e) }));
            
            const addEducation = () => setCV(c => ({ ...c, education: [...c.education, { id: uid(), institution: "", degree: "", field: "", start: "", end: "", grade: "", notes: "" }] }));
            const removeEducation = (id) => setCV(c => ({ ...c, education: c.education.filter(e => e.id !== id) }));
            const updateEducation = (id, field, value) => setCV(c => ({ ...c, education: c.education.map(e => e.id === id ? { ...e, [field]: value } : e) }));
            
            const addSkill = (cat) => {
                const val = prompt(`Add ${cat} skill:`);
                if (val && val.trim()) {
                    setCV(c => ({ ...c, skills: { ...c.skills, [cat]: [...(c.skills[cat] || []), val.trim()] } }));
                }
            };
            const removeSkill = (cat, idx) => setCV(c => ({ ...c, skills: { ...c.skills, [cat]: c.skills[cat].filter((_, i) => i !== idx) } }));
            
            const addProject = () => setCV(c => ({ ...c, projects: [...c.projects, { id: uid(), name: "", url: "", tech: "", description: "", bullets: [""] }] }));
            const removeProject = (id) => setCV(c => ({ ...c, projects: c.projects.filter(p => p.id !== id) }));
            const updateProject = (id, field, value) => setCV(c => ({ ...c, projects: c.projects.map(p => p.id === id ? { ...p, [field]: value } : p) }));
            
            const addCert = () => setCV(c => ({ ...c, certifications: [...c.certifications, { id: uid(), name: "", issuer: "", date: "", expires: "", url: "" }] }));
            const removeCert = (id) => setCV(c => ({ ...c, certifications: c.certifications.filter(cert => cert.id !== id) }));
            const updateCert = (id, field, value) => setCV(c => ({ ...c, certifications: c.certifications.map(cert => cert.id === id ? { ...cert, [field]: value } : cert) }));
            
            const addLang = () => setCV(c => ({ ...c, languages: [...c.languages, { id: uid(), language: "", level: "" }] }));
            const removeLang = (id) => setCV(c => ({ ...c, languages: c.languages.filter(l => l.id !== id) }));
            const updateLang = (id, field, value) => setCV(c => ({ ...c, languages: c.languages.map(l => l.id === id ? { ...l, [field]: value } : l) }));
            
            const addAward = () => setCV(c => ({ ...c, awards: [...c.awards, { id: uid(), title: "", issuer: "", date: "", description: "" }] }));
            const removeAward = (id) => setCV(c => ({ ...c, awards: c.awards.filter(a => a.id !== id) }));
            const updateAward = (id, field, value) => setCV(c => ({ ...c, awards: c.awards.map(a => a.id === id ? { ...a, [field]: value } : a) }));
            
            const exportJSON = () => {
                const blob = new Blob([JSON.stringify(cv, null, 2)], { type: "application/json" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `${cv.personal.name || "cv"}.json`;
                a.click();
            };
            
            const exportPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const pageWidth = doc.internal.pageSize.getWidth();
                let y = 15;
                const leftMargin = 15;
                const rightMargin = pageWidth - 15;
                
                // Name
                doc.setFontSize(20);
                doc.setFont("helvetica", "bold");
                doc.text(cv.personal.name || "Your Name", leftMargin, y);
                y += 7;
                
                // Title
                if (cv.personal.title) {
                    doc.setFontSize(12);
                    doc.setFont("helvetica", "normal");
                    doc.setTextColor(100);
                    doc.text(cv.personal.title, leftMargin, y);
                    y += 6;
                }
                
                // Contact info
                doc.setFontSize(9);
                doc.setTextColor(80);
                const contactParts = [];
                if (cv.personal.email) contactParts.push(cv.personal.email);
                if (cv.personal.phone) contactParts.push(cv.personal.phone);
                if (cv.personal.location) contactParts.push(cv.personal.location);
                if (cv.personal.linkedin) contactParts.push(cv.personal.linkedin);
                if (cv.personal.github) contactParts.push(cv.personal.github);
                doc.text(contactParts.join(" | "), leftMargin, y);
                y += 8;
                doc.setTextColor(0);
                
                // Summary
                if (cv.personal.summary) {
                    doc.setFontSize(10);
                    const summaryLines = doc.splitTextToSize(cv.personal.summary, pageWidth - 30);
                    doc.text(summaryLines, leftMargin, y);
                    y += summaryLines.length * 4 + 6;
                }
                
                // Experience
                if (cv.experience.length > 0) {
                    y = addSection(doc, "EXPERIENCE", y, leftMargin, rightMargin);
                    cv.experience.forEach(exp => {
                        doc.setFontSize(11);
                        doc.setFont("helvetica", "bold");
                        doc.text(exp.role || "Role", leftMargin, y);
                        doc.setFont("helvetica", "normal");
                        const dateStr = `${exp.start || ""} - ${exp.end || "Present"}`;
                        doc.text(dateStr, rightMargin, y, { align: "right" });
                        y += 5;
                        
                        doc.setFontSize(10);
                        doc.setTextColor(60);
                        doc.text(`${exp.company || ""}${exp.location ? ` · ${exp.location}` : ""}`, leftMargin, y);
                        y += 4;
                        doc.setTextColor(0);
                        
                        if (exp.bullets?.length > 0) {
                            exp.bullets.filter(Boolean).forEach(bullet => {
                                const lines = doc.splitTextToSize("• " + bullet, pageWidth - 30);
                                doc.setFontSize(9);
                                doc.text(lines, leftMargin + 3, y);
                                y += lines.length * 4;
                            });
                        }
                        y += 4;
                    });
                }
                
                // Education
                if (cv.education.length > 0) {
                    y = addSection(doc, "EDUCATION", y, leftMargin, rightMargin);
                    cv.education.forEach(edu => {
                        doc.setFontSize(11);
                        doc.setFont("helvetica", "bold");
                        const degreeText = `${edu.degree || ""}${edu.field ? ` in ${edu.field}` : ""}`;
                        doc.text(degreeText, leftMargin, y);
                        doc.setFont("helvetica", "normal");
                        doc.text(`${edu.start || ""} - ${edu.end || ""}`, rightMargin, y, { align: "right" });
                        y += 5;
                        
                        doc.setFontSize(10);
                        doc.setTextColor(60);
                        const subText = `${edu.institution || ""}${edu.grade ? ` · ${edu.grade}` : ""}`;
                        doc.text(subText, leftMargin, y);
                        y += 6;
                        doc.setTextColor(0);
                    });
                }
                
                // Skills
                const allSkills = [...cv.skills.technical, ...cv.skills.tools, ...cv.skills.soft, ...cv.skills.other].filter(Boolean);
                if (allSkills.length > 0) {
                    y = addSection(doc, "SKILLS", y, leftMargin, rightMargin);
                    doc.setFontSize(10);
                    doc.text(allSkills.join(" • "), leftMargin, y);
                    y += 8;
                }
                
                // Projects
                if (cv.projects.length > 0) {
                    y = addSection(doc, "PROJECTS", y, leftMargin, rightMargin);
                    cv.projects.forEach(proj => {
                        doc.setFontSize(11);
                        doc.setFont("helvetica", "bold");
                        doc.text(proj.name || "Project", leftMargin, y);
                        if (proj.tech) {
                            doc.setFontSize(9);
                            doc.setTextColor(60);
                            doc.text(`(${proj.tech})`, leftMargin + doc.getTextWidth(proj.name || "") + 3, y);
                            doc.setTextColor(0);
                        }
                        y += 5;
                        
                        if (proj.url) {
                            doc.setFontSize(9);
                            doc.setTextColor(0, 100, 200);
                            doc.text(proj.url, leftMargin, y);
                            y += 4;
                            doc.setTextColor(0);
                        }
                        if (proj.description) {
                            const descLines = doc.splitTextToSize(proj.description, pageWidth - 30);
                            doc.setFontSize(9);
                            doc.text(descLines, leftMargin, y);
                            y += descLines.length * 4;
                        }
                        y += 3;
                    });
                }
                
                // Certifications
                if (cv.certifications.length > 0) {
                    y = addSection(doc, "CERTIFICATIONS", y, leftMargin, rightMargin);
                    cv.certifications.forEach(cert => {
                        doc.setFontSize(11);
                        doc.setFont("helvetica", "bold");
                        doc.text(cert.name || "Certification", leftMargin, y);
                        doc.setFont("helvetica", "normal");
                        if (cert.date) {
                            doc.setFontSize(9);
                            doc.text(cert.date, rightMargin, y, { align: "right" });
                        }
                        y += 5;
                        
                        doc.setFontSize(10);
                        doc.setTextColor(60);
                        doc.text(`${cert.issuer || ""}`, leftMargin, y);
                        y += 6;
                        doc.setTextColor(0);
                    });
                }
                
                // Languages
                if (cv.languages.length > 0) {
                    y = addSection(doc, "LANGUAGES", y, leftMargin, rightMargin);
                    doc.setFontSize(10);
                    const langText = cv.languages.map(l => `${l.language}${l.level ? ` (${l.level})` : ""}`).join(" • ");
                    doc.text(langText, leftMargin, y);
                    y += 8;
                }
                
                doc.save(`${cv.personal.name || "cv"}.pdf`);
            };
            
            const addSection = (doc, title, y, leftMargin, rightMargin) => {
                doc.setFontSize(12);
                doc.setFont("helvetica", "bold");
                doc.setTextColor(124, 92, 252);
                doc.text(title, leftMargin, y);
                doc.setDrawColor(124, 92, 252);
                doc.line(leftMargin, y + 2, rightMargin, y + 2);
                return y + 10;
            };
            
            const exportLinkedIn = () => {
                // LinkedIn CSV format for import
                const headers = ["Name", "Email", "Phone", "Location", "Title", "Summary", "Skills"];
                const skills = [...cv.skills.technical, ...cv.skills.tools, ...cv.skills.soft, ...cv.skills.other].join(", ");
                
                const row = [
                    cv.personal.name || "",
                    cv.personal.email || "",
                    cv.personal.phone || "",
                    cv.personal.location || "",
                    cv.personal.title || "",
                    cv.personal.summary || "",
                    skills
                ].map(v => `"${(v || "").replace(/"/g, '""')}"`);
                
                const csv = headers.join(",") + "\n" + row.join(",");
                const blob = new Blob([csv], { type: "text/csv" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = `${cv.personal.name || "cv"}_linkedin.csv`;
                a.click();
            };
            
            const importJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        setCV({ ...EMPTY_CV, ...data });
                        alert("CV imported successfully!");
                    } catch { alert("Invalid JSON file"); }
                };
                reader.readAsText(file);
                e.target.value = "";
            };
            
            return (
                <div className="app">
                    <div className="header">
                        <span className="header-title">CV Studio</span>
                        <div style={{display:'flex',gap:8}}>
                            <input type="file" accept=".json" style={{display:'none'}} onChange={importJSON} />
                            <button className="btn" onClick={() => document.querySelector('input[type=file]').click()}>📂 Import</button>
                            <button className="btn" onClick={exportJSON}>💾 Export JSON</button>
                            <button className="btn" onClick={exportPDF}>📄 Export PDF</button>
                            <button className="btn" onClick={exportLinkedIn}>🔗 Export LinkedIn</button>
                            <button className="btn btn-primary" onClick={() => setShowPreview(!showPreview)}>{showPreview ? 'Hide Preview' : 'Show Preview'}</button>
                        </div>
                    </div>
                    <div className="shell">
                        <div className="sidebar">
                            <div className="nav-section">
                                <div className="nav-label">Build</div>
                                <div className={`nav-item ${tab === 'personal' ? 'active' : ''}`} onClick={() => setTab('personal')}>👤 Personal</div>
                                <div className={`nav-item ${tab === 'experience' ? 'active' : ''}`} onClick={() => setTab('experience')}>💼 Experience</div>
                                <div className={`nav-item ${tab === 'education' ? 'active' : ''}`} onClick={() => setTab('education')}>🎓 Education</div>
                                <div className={`nav-item ${tab === 'skills' ? 'active' : ''}`} onClick={() => setTab('skills')}>⚡ Skills</div>
                            </div>
                            <div className="nav-section">
                                <div className="nav-label">Additional</div>
                                <div className={`nav-item ${tab === 'projects' ? 'active' : ''}`} onClick={() => setTab('projects')}>🚀 Projects</div>
                                <div className={`nav-item ${tab === 'certifications' ? 'active' : ''}`} onClick={() => setTab('certifications')}>🏆 Certifications</div>
                                <div className={`nav-item ${tab === 'languages' ? 'active' : ''}`} onClick={() => setTab('languages')}>🌍 Languages</div>
                                <div className={`nav-item ${tab === 'awards' ? 'active' : ''}`} onClick={() => setTab('awards')}>⭐ Awards</div>
                            </div>
                        </div>
                        
                        <div className="editor">
                            {tab === 'personal' && (
                                <div className="card">
                                    <div className="section-header"><h3>Personal Details</h3></div>
                                    <label className="lbl">Full Name</label>
                                    <input className="inp" value={cv.personal.name} onChange={e => updateCV({ personal: { ...cv.personal, name: e.target.value } })} />
                                    <label className="lbl">Job Title</label>
                                    <input className="inp" value={cv.personal.title} onChange={e => updateCV({ personal: { ...cv.personal, title: e.target.value } })} />
                                    <div className="row">
                                        <div style={{flex:1}}>
                                            <label className="lbl">Email</label>
                                            <input className="inp" value={cv.personal.email} onChange={e => updateCV({ personal: { ...cv.personal, email: e.target.value } })} />
                                        </div>
                                        <div style={{flex:1}}>
                                            <label className="lbl">Phone</label>
                                            <input className="inp" value={cv.personal.phone} onChange={e => updateCV({ personal: { ...cv.personal, phone: e.target.value } })} />
                                        </div>
                                    </div>
                                    <label className="lbl">Location</label>
                                    <input className="inp" value={cv.personal.location} onChange={e => updateCV({ personal: { ...cv.personal, location: e.target.value } })} />
                                    <div className="row">
                                        <div style={{flex:1}}>
                                            <label className="lbl">LinkedIn</label>
                                            <input className="inp" value={cv.personal.linkedin} onChange={e => updateCV({ personal: { ...cv.personal, linkedin: e.target.value } })} />
                                        </div>
                                        <div style={{flex:1}}>
                                            <label className="lbl">GitHub</label>
                                            <input className="inp" value={cv.personal.github} onChange={e => updateCV({ personal: { ...cv.personal, github: e.target.value } })} />
                                        </div>
                                    </div>
                                    <label className="lbl">Professional Summary</label>
                                    <textarea className="inp" rows={4} value={cv.personal.summary} onChange={e => updateCV({ personal: { ...cv.personal, summary: e.target.value } })} />
                                </div>
                            )}
                            
                            {tab === 'experience' && (
                                <div>
                                    <div className="section-header">
                                        <h3>Work Experience</h3>
                                        <button className="btn btn-primary" onClick={addExperience}>+ Add</button>
                                    </div>
                                    {cv.experience.length === 0 && <p className="empty-msg">No experience added yet. Click "+ Add" to add your work history.</p>}
                                    {cv.experience.map((exp, i) => (
                                        <div key={exp.id} className="card">
                                            <input className="inp" placeholder="Company" value={exp.company} onChange={e => updateExperience(exp.id, 'company', e.target.value)} />
                                            <input className="inp" placeholder="Role / Job Title" value={exp.role} onChange={e => updateExperience(exp.id, 'role', e.target.value)} />
                                            <div className="row">
                                                <input className="inp" placeholder="Start Date" value={exp.start} onChange={e => updateExperience(exp.id, 'start', e.target.value)} />
                                                <input className="inp" placeholder="End Date" value={exp.end} onChange={e => updateExperience(exp.id, 'end', e.target.value)} />
                                            </div>
                                            <input className="inp" placeholder="Location" value={exp.location} onChange={e => updateExperience(exp.id, 'location', e.target.value)} />
                                            <label className="lbl">Achievements / Responsibilities (one per line)</label>
                                            <textarea className="inp" rows={4} value={exp.bullets?.join('\n') || ''} onChange={e => updateExperience(exp.id, 'bullets', e.target.value.split('\n').filter(Boolean))} />
                                            <button className="btn btn-danger" onClick={() => removeExperience(exp.id)}>Remove</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {tab === 'education' && (
                                <div>
                                    <div className="section-header">
                                        <h3>Education</h3>
                                        <button className="btn btn-primary" onClick={addEducation}>+ Add</button>
                                    </div>
                                    {cv.education.length === 0 && <p className="empty-msg">No education added yet.</p>}
                                    {cv.education.map((edu, i) => (
                                        <div key={edu.id} className="card">
                                            <input className="inp" placeholder="Institution" value={edu.institution} onChange={e => updateEducation(edu.id, 'institution', e.target.value)} />
                                            <div className="row">
                                                <input className="inp" placeholder="Degree" value={edu.degree} onChange={e => updateEducation(edu.id, 'degree', e.target.value)} />
                                                <input className="inp" placeholder="Field of Study" value={edu.field} onChange={e => updateEducation(edu.id, 'field', e.target.value)} />
                                            </div>
                                            <div className="row">
                                                <input className="inp" placeholder="Start" value={edu.start} onChange={e => updateEducation(edu.id, 'start', e.target.value)} />
                                                <input className="inp" placeholder="End" value={edu.end} onChange={e => updateEducation(edu.id, 'end', e.target.value)} />
                                            </div>
                                            <input className="inp" placeholder="Grade / Result" value={edu.grade} onChange={e => updateEducation(edu.id, 'grade', e.target.value)} />
                                            <button className="btn btn-danger" onClick={() => removeEducation(edu.id)}>Remove</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {tab === 'skills' && (
                                <div className="card">
                                    <div className="section-header"><h3>Skills</h3></div>
                                    {['technical', 'tools', 'soft', 'other'].map(cat => (
                                        <div key={cat} style={{marginBottom: 16}}>
                                            <label className="lbl" style={{textTransform:'capitalize'}}>{cat} Skills</label>
                                            <div style={{display:'flex', flexWrap:'wrap', gap: 6, marginBottom: 6}}>
                                                {(cv.skills[cat] || []).map((skill, i) => (
                                                    <span key={i} style={{background:'#16162a', padding:'4px 10px', borderRadius:14, fontSize:12, display:'flex', alignItems:'center', gap:6}}>
                                                        {skill}
                                                        <span style={{cursor:'pointer', color:'#f87171'}} onClick={() => removeSkill(cat, i)}>×</span>
                                                    </span>
                                                ))}
                                            </div>
                                            <button className="btn" onClick={() => addSkill(cat)}>+ Add {cat}</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {tab === 'projects' && (
                                <div>
                                    <div className="section-header">
                                        <h3>Projects</h3>
                                        <button className="btn btn-primary" onClick={addProject}>+ Add</button>
                                    </div>
                                    {cv.projects.length === 0 && <p className="empty-msg">No projects added yet.</p>}
                                    {cv.projects.map((proj, i) => (
                                        <div key={proj.id} className="card">
                                            <input className="inp" placeholder="Project Name" value={proj.name} onChange={e => updateProject(proj.id, 'name', e.target.value)} />
                                            <input className="inp" placeholder="Technologies Used" value={proj.tech} onChange={e => updateProject(proj.id, 'tech', e.target.value)} />
                                            <input className="inp" placeholder="Project URL" value={proj.url} onChange={e => updateProject(proj.id, 'url', e.target.value)} />
                                            <textarea className="inp" rows={2} placeholder="Description" value={proj.description} onChange={e => updateProject(proj.id, 'description', e.target.value)} />
                                            <button className="btn btn-danger" onClick={() => removeProject(proj.id)}>Remove</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {tab === 'certifications' && (
                                <div>
                                    <div className="section-header">
                                        <h3>Certifications</h3>
                                        <button className="btn btn-primary" onClick={addCert}>+ Add</button>
                                    </div>
                                    {cv.certifications.length === 0 && <p className="empty-msg">No certifications added yet.</p>}
                                    {cv.certifications.map((cert, i) => (
                                        <div key={cert.id} className="card">
                                            <input className="inp" placeholder="Certification Name" value={cert.name} onChange={e => updateCert(cert.id, 'name', e.target.value)} />
                                            <input className="inp" placeholder="Issuing Organization" value={cert.issuer} onChange={e => updateCert(cert.id, 'issuer', e.target.value)} />
                                            <div className="row">
                                                <input className="inp" placeholder="Date Obtained" value={cert.date} onChange={e => updateCert(cert.id, 'date', e.target.value)} />
                                                <input className="inp" placeholder="Expiry Date" value={cert.expires} onChange={e => updateCert(cert.id, 'expires', e.target.value)} />
                                            </div>
                                            <input className="inp" placeholder="Credential URL" value={cert.url} onChange={e => updateCert(cert.id, 'url', e.target.value)} />
                                            <button className="btn btn-danger" onClick={() => removeCert(cert.id)}>Remove</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {tab === 'languages' && (
                                <div>
                                    <div className="section-header">
                                        <h3>Languages</h3>
                                        <button className="btn btn-primary" onClick={addLang}>+ Add</button>
                                    </div>
                                    {cv.languages.length === 0 && <p className="empty-msg">No languages added yet.</p>}
                                    {cv.languages.map((lang, i) => (
                                        <div key={lang.id} className="card">
                                            <div className="row">
                                                <input className="inp" placeholder="Language" value={lang.language} onChange={e => updateLang(lang.id, 'language', e.target.value)} />
                                                <input className="inp" placeholder="Proficiency (e.g., Native, Fluent, Intermediate)" value={lang.level} onChange={e => updateLang(lang.id, 'level', e.target.value)} />
                                            </div>
                                            <button className="btn btn-danger" onClick={() => removeLang(lang.id)}>Remove</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {tab === 'awards' && (
                                <div>
                                    <div className="section-header">
                                        <h3>Awards & Achievements</h3>
                                        <button className="btn btn-primary" onClick={addAward}>+ Add</button>
                                    </div>
                                    {cv.awards.length === 0 && <p className="empty-msg">No awards added yet.</p>}
                                    {cv.awards.map((award, i) => (
                                        <div key={award.id} className="card">
                                            <input className="inp" placeholder="Award Title" value={award.title} onChange={e => updateAward(award.id, 'title', e.target.value)} />
                                            <input className="inp" placeholder="Issuing Organization" value={award.issuer} onChange={e => updateAward(award.id, 'issuer', e.target.value)} />
                                            <input className="inp" placeholder="Date" value={award.date} onChange={e => updateAward(award.id, 'date', e.target.value)} />
                                            <textarea className="inp" rows={2} placeholder="Description" value={award.description} onChange={e => updateAward(award.id, 'description', e.target.value)} />
                                            <button className="btn btn-danger" onClick={() => removeAward(award.id)}>Remove</button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                        
                        {showPreview && (
                            <div className="preview">
                                <div className="preview-header">
                                    <div className="preview-name">{cv.personal.name || 'Your Name'}</div>
                                    {cv.personal.title && <div className="preview-title">{cv.personal.title}</div>}
                                    <div className="preview-contact">
                                        {cv.personal.email && <span>{cv.personal.email}</span>}
                                        {cv.personal.phone && <span>{cv.personal.phone}</span>}
                                        {cv.personal.location && <span>{cv.personal.location}</span>}
                                        {cv.personal.linkedin && <span>{cv.personal.linkedin}</span>}
                                        {cv.personal.github && <span>{cv.personal.github}</span>}
                                    </div>
                                </div>
                                
                                {cv.personal.summary && (
                                    <div className="preview-section">
                                        <div className="preview-section-title">Profile</div>
                                        <div className="preview-text">{cv.personal.summary}</div>
                                    </div>
                                )}
                                
                                {cv.experience.length > 0 && (
                                    <div className="preview-section">
                                        <div className="preview-section-title">Experience</div>
                                        {cv.experience.map(exp => (
                                            <div key={exp.id} className="preview-item">
                                                <div>
                                                    <span className="preview-item-title">{exp.role}</span>
                                                    <span className="preview-item-date">{exp.start} - {exp.end || 'Present'}</span>
                                                </div>
                                                <div className="preview-item-sub">{exp.company}{exp.location && ` · ${exp.location}`}</div>
                                                {exp.bullets?.filter(Boolean).map((b, i) => (
                                                    <div key={i} className="preview-text" style={{marginLeft: 10}}>• {b}</div>
                                                ))}
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {cv.skills.technical.length > 0 && (
                                    <div className="preview-section">
                                        <div className="preview-section-title">Skills</div>
                                        <div className="preview-skills">
                                            {cv.skills.technical.length > 0 && <div><strong>Technical:</strong> {cv.skills.technical.join(', ')}</div>}
                                            {cv.skills.tools.length > 0 && <div><strong>Tools:</strong> {cv.skills.tools.join(', ')}</div>}
                                            {cv.skills.soft.length > 0 && <div><strong>Soft Skills:</strong> {cv.skills.soft.join(', ')}</div>}
                                        </div>
                                    </div>
                                )}
                                
                                {cv.education.length > 0 && (
                                    <div className="preview-section">
                                        <div className="preview-section-title">Education</div>
                                        {cv.education.map(edu => (
                                            <div key={edu.id} className="preview-item">
                                                <div>
                                                    <span className="preview-item-title">{edu.degree}{edu.field && ` in ${edu.field}`}</span>
                                                    <span className="preview-item-date">{edu.start} - {edu.end}</span>
                                                </div>
                                                <div className="preview-item-sub">{edu.institution}{edu.grade && ` · ${edu.grade}`}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {cv.projects.length > 0 && (
                                    <div className="preview-section">
                                        <div className="preview-section-title">Projects</div>
                                        {cv.projects.map(proj => (
                                            <div key={proj.id} className="preview-item">
                                                <div className="preview-item-title">{proj.name}{proj.tech && <span style={{fontWeight:400, color:'#666', fontSize:10}}> · {proj.tech}</span>}</div>
                                                {proj.url && <div className="preview-item-sub">{proj.url}</div>}
                                                {proj.description && <div className="preview-text">{proj.description}</div>}
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {cv.certifications.length > 0 && (
                                    <div className="preview-section">
                                        <div className="preview-section-title">Certifications</div>
                                        {cv.certifications.map(cert => (
                                            <div key={cert.id} className="preview-item">
                                                <div className="preview-item-title">{cert.name}</div>
                                                <div className="preview-item-sub">{cert.issuer}{cert.date && ` · ${cert.date}`}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {cv.languages.length > 0 && (
                                    <div className="preview-section">
                                        <div className="preview-section-title">Languages</div>
                                        <div className="preview-text">
                                            {cv.languages.map(l => `${l.language}${l.level ? ` (${l.level})` : ''}`).join(' · ')}
                                        </div>
                                    </div>
                                )}
                                
                                {cv.awards.length > 0 && (
                                    <div className="preview-section">
                                        <div className="preview-section-title">Awards</div>
                                        {cv.awards.map(award => (
                                            <div key={award.id} className="preview-item">
                                                <div className="preview-item-title">{award.title}</div>
                                                <div className="preview-item-sub">{award.issuer}{award.date && ` · ${award.date}`}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<CVStudio />);
    </script>
</body>
</html>
