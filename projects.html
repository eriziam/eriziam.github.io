<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CV Studio - Eryk Kirzanowski</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #080810; font-family: 'Sora', sans-serif; color: #e2e0f0; }
        .app { min-height: 100vh; display: flex; flex-direction: column; }
        .header { border-bottom: 1px solid #1c1c30; padding: 0 18px; display: flex; align-items: center; justify-content: space-between; height: 50px; background: #0a0a14; }
        .header-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #b09fff; }
        .shell { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 50px); }
        .sidebar { width: 196px; background: #0a0a14; border-right: 1px solid #1c1c30; display: flex; flex-direction: column; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 7px 14px; cursor: pointer; font-size: 12.5px; font-weight: 400; color: #6060a0; transition: all 0.12s; }
        .nav-item:hover { color: #b09fff; }
        .nav-item.active { background: #16162a; color: #b09fff; border-left: 2px solid #7c5cfc; font-weight: 600; }
        .section-title { padding: 10px 14px 3px; font-size: 10px; color: #3a3a5a; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
        .editor { flex: 1; overflow-y: auto; padding: 18px 22px; background: #080810; }
        .preview { width: 390px; border-left: 1px solid #1c1c30; overflow-y: auto; background: #f4f3f0; padding: 20px; color: #1a1a2a; flex-shrink: 0; }
        .card { background: #0e0e1c; border: 1px solid #1c1c30; border-radius: 10px; padding: 16px 18px; margin-bottom: 12px; }
        .inp { width: 100%; background: #080812; border: 1px solid #1c1c30; border-radius: 6px; padding: 7px 10px; color: #e2e0f0; font-size: 13px; outline: none; margin-bottom: 10px; }
        .inp:focus { border-color: #4a3a8a; }
        .lbl { font-size: 11px; color: #6060a0; margin-bottom: 3px; display: block; }
        .btn { padding: 8px 14px; border-radius: 6px; border: 1px solid #1c1c30; background: #14142a; color: #b09fff; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #1a1a30; }
        .btn-primary { background: #7c5cfc; color: #000; border: none; }
        .btn-primary:hover { background: #9585ff; }
        .btn-danger { border-color: #4a1a1a; color: #f87171; }
        .back-btn { color: #6060a0; position: fixed; top: 20px; left: 20px; z-index: 10; }
        .back-btn:hover { color: #b09fff; }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back to Site</a>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const uid = () => Math.random().toString(36).slice(2, 9);
        
        const EMPTY_CV = {
            personal: { name: "Eryk Kirzanowski", title: "IT Enthusiast | Web Developer", email: "eryk@example.com", phone: "", location: "UK", linkedin: "linkedin.com/in/eryk-kirzanowski", github: "github.com/Nobzie", website: "", summary: "Self-motivated developer with experience in HTML, CSS, JavaScript, Java, C#, and Python. Passionate about building projects from scratch with simplicity." },
            experience: [],
            education: [{ id: uid(), institution: "Solihull College & University Centre", degree: "BTEC Level 3 Extended", field: "Computing", start: "2016", end: "2019", grade: "D*D*D*" }],
            skills: { technical: ["HTML", "CSS", "JavaScript", "Java", "C#", "Python", "Git"], tools: ["VS Code", "GIMP", "Inkscape"], soft: ["Communication", "Problem Solving"], other: [] },
            certifications: [],
            projects: [],
            languages: [{ id: uid(), language: "Polish", level: "Native" }, { id: uid(), language: "English", level: "Fluent" }],
            awards: [],
            volunteering: []
        };
        
        function CVStudio() {
            const [cv, setCV] = useState(() => {
                try { const s = localStorage.getItem("cvs3"); return s ? JSON.parse(s) : EMPTY_CV; }
                catch { return EMPTY_CV; }
            });
            const [tab, setTab] = useState("personal");
            const [showPreview, setShowPreview] = useState(true);
            
            useEffect(() => { localStorage.setItem("cvs3", JSON.stringify(cv)); }, [cv]);
            
            const patch = (path, value) => setCV(c => {
                const newCV = {...c};
                const keys = path.split(".");
                let obj = newCV;
                for (let i = 0; i < keys.length - 1; i++) obj = obj[keys[i]] = obj[keys[i]] ? {...obj[keys[i]]} : {};
                obj[keys[keys.length - 1]] = value;
                return newCV;
            });
            
            const NAV = [
                { id: "personal", label: "Personal", icon: "👤" },
                { id: "experience", label: "Experience", icon: "💼" },
                { id: "education", label: "Education", icon: "🎓" },
                { id: "skills", label: "Skills", icon: "⚡" },
                { id: "projects", label: "Projects", icon: "🚀" },
                { id: "certifications", label: "Certs", icon: "🏆" },
                { id: "languages", label: "Languages", icon: "🌍" },
                { id: "awards", label: "Awards", icon: "⭐" }
            ];
            
            const addItem = (section) => setCV(c => ({ ...c, [section]: [...c[section], { id: uid() }] }));
            const removeItem = (section, id) => setCV(c => ({ ...c, [section]: c[section].filter(x => x.id !== id) }));
            
            return (
                <div className="app">
                    <div className="header">
                        <span className="header-title">CV Studio</span>
                        <div style={{display:'flex',gap:8}}>
                            <button className="btn" onClick={() => localStorage.setItem("cvs3",JSON.stringify(cv))}>💾 Save</button>
                            <button className="btn" onClick={() => setShowPreview(!showPreview)}>{showPreview ? 'Hide Preview' : 'Show Preview'}</button>
                        </div>
                    </div>
                    <div className="shell">
                        <div className="sidebar">
                            {NAV.map(item => (
                                <div key={item.id} className={`nav-item ${tab === item.id ? 'active' : ''}`}
                                    onClick={() => setTab(item.id)}>
                                    <span>{item.icon}</span> {item.label}
                                </div>
                            ))}
                        </div>
                        <div className="editor">
                            {tab === 'personal' && (
                                <div className="card">
                                    <h3 style={{fontSize:11,color:'#6060a0',marginBottom:11}}>Personal Details</h3>
                                    <label className="lbl">Full Name</label>
                                    <input className="inp" value={cv.personal.name} onChange={e => patch('personal.name', e.target.value)} />
                                    <label className="lbl">Job Title</label>
                                    <input className="inp" value={cv.personal.title} onChange={e => patch('personal.title', e.target.value)} />
                                    <label className="lbl">Email</label>
                                    <input className="inp" value={cv.personal.email} onChange={e => patch('personal.email', e.target.value)} />
                                    <label className="lbl">Phone</label>
                                    <input className="inp" value={cv.personal.phone} onChange={e => patch('personal.phone', e.target.value)} />
                                    <label className="lbl">Location</label>
                                    <input className="inp" value={cv.personal.location} onChange={e => patch('personal.location', e.target.value)} />
                                    <label className="lbl">LinkedIn</label>
                                    <input className="inp" value={cv.personal.linkedin} onChange={e => patch('personal.linkedin', e.target.value)} />
                                    <label className="lbl">GitHub</label>
                                    <input className="inp" value={cv.personal.github} onChange={e => patch('personal.github', e.target.value)} />
                                    <label className="lbl">Summary</label>
                                    <textarea className="inp" rows={4} value={cv.personal.summary} onChange={e => patch('personal.summary', e.target.value)} />
                                </div>
                            )}
                            {tab === 'experience' && (
                                <div>
                                    <h3 style={{fontSize:11,color:'#6060a0',marginBottom:11}}>Experience</h3>
                                    {cv.experience.map((exp, i) => (
                                        <div key={exp.id} className="card">
                                            <input className="inp" placeholder="Company" value={exp.company} onChange={e => patch(`experience.${i}.company`, e.target.value)} />
                                            <input className="inp" placeholder="Role" value={exp.role} onChange={e => patch(`experience.${i}.role`, e.target.value)} />
                                            <div style={{display:'flex',gap:10}}>
                                                <input className="inp" placeholder="Start" value={exp.start} onChange={e => patch(`experience.${i}.start`, e.target.value)} />
                                                <input className="inp" placeholder="End" value={exp.end} onChange={e => patch(`experience.${i}.end`, e.target.value)} />
                                            </div>
                                            <textarea className="inp" rows={3} placeholder="Bullets (one per line)" value={exp.bullets?.join('\n') || ''} onChange={e => patch(`experience.${i}.bullets`, e.target.value.split('\n'))} />
                                            <button className="btn btn-danger" onClick={() => removeItem('experience', exp.id)}>Remove</button>
                                        </div>
                                    ))}
                                    <button className="btn btn-primary" onClick={() => addItem('experience')}>+ Add Experience</button>
                                </div>
                            )}
                            {tab === 'education' && (
                                <div>
                                    <h3 style={{fontSize:11,color:'#6060a0',marginBottom:11}}>Education</h3>
                                    {cv.education.map((edu, i) => (
                                        <div key={edu.id} className="card">
                                            <input className="inp" placeholder="Institution" value={edu.institution} onChange={e => patch(`education.${i}.institution`, e.target.value)} />
                                            <input className="inp" placeholder="Degree" value={edu.degree} onChange={e => patch(`education.${i}.degree`, e.target.value)} />
                                            <input className="inp" placeholder="Field of Study" value={edu.field} onChange={e => patch(`education.${i}.field`, e.target.value)} />
                                            <div style={{display:'flex',gap:10}}>
                                                <input className="inp" placeholder="Start" value={edu.start} onChange={e => patch(`education.${i}.start`, e.target.value)} />
                                                <input className="inp" placeholder="End" value={edu.end} onChange={e => patch(`education.${i}.end`, e.target.value)} />
                                            </div>
                                            <input className="inp" placeholder="Grade" value={edu.grade} onChange={e => patch(`education.${i}.grade`, e.target.value)} />
                                            <button className="btn btn-danger" onClick={() => removeItem('education', edu.id)}>Remove</button>
                                        </div>
                                    ))}
                                    <button className="btn btn-primary" onClick={() => addItem('education')}>+ Add Education</button>
                                </div>
                            )}
                            {tab === 'skills' && (
                                <div className="card">
                                    <h3 style={{fontSize:11,color:'#6060a0',marginBottom:11}}>Skills</h3>
                                    <label className="lbl">Technical (comma separated)</label>
                                    <textarea className="inp" rows={2} value={cv.skills.technical.join(', ')} onChange={e => patch('skills.technical', e.target.value.split(', ').filter(Boolean))} />
                                    <label className="lbl">Tools (comma separated)</label>
                                    <textarea className="inp" rows={2} value={cv.skills.tools.join(', ')} onChange={e => patch('skills.tools', e.target.value.split(', ').filter(Boolean))} />
                                    <label className="lbl">Soft Skills (comma separated)</label>
                                    <textarea className="inp" rows={2} value={cv.skills.soft.join(', ')} onChange={e => patch('skills.soft', e.target.value.split(', ').filter(Boolean))} />
                                </div>
                            )}
                            {tab === 'projects' && (
                                <div>
                                    <h3 style={{fontSize:11,color:'#6060a0',marginBottom:11}}>Projects</h3>
                                    {cv.projects.map((proj, i) => (
                                        <div key={proj.id} className="card">
                                            <input className="inp" placeholder="Project Name" value={proj.name} onChange={e => patch(`projects.${i}.name`, e.target.value)} />
                                            <input className="inp" placeholder="Technologies" value={proj.tech} onChange={e => patch(`projects.${i}.tech`, e.target.value)} />
                                            <input className="inp" placeholder="URL" value={proj.url} onChange={e => patch(`projects.${i}.url`, e.target.value)} />
                                            <textarea className="inp" rows={2} placeholder="Description" value={proj.description} onChange={e => patch(`projects.${i}.description`, e.target.value)} />
                                            <button className="btn btn-danger" onClick={() => removeItem('projects', proj.id)}>Remove</button>
                                        </div>
                                    ))}
                                    <button className="btn btn-primary" onClick={() => addItem('projects')}>+ Add Project</button>
                                </div>
                            )}
                            {tab === 'certifications' && (
                                <div>
                                    <h3 style={{fontSize:11,color:'#6060a0',marginBottom:11}}>Certifications</h3>
                                    {cv.certifications.map((cert, i) => (
                                        <div key={cert.id} className="card">
                                            <input className="inp" placeholder="Certification Name" value={cert.name} onChange={e => patch(`certifications.${i}.name`, e.target.value)} />
                                            <input className="inp" placeholder="Issuer" value={cert.issuer} onChange={e => patch(`certifications.${i}.issuer`, e.target.value)} />
                                            <input className="inp" placeholder="Date" value={cert.date} onChange={e => patch(`certifications.${i}.date`, e.target.value)} />
                                            <button className="btn btn-danger" onClick={() => removeItem('certifications', cert.id)}>Remove</button>
                                        </div>
                                    ))}
                                    <button className="btn btn-primary" onClick={() => addItem('certifications')}>+ Add Certification</button>
                                </div>
                            )}
                            {tab === 'languages' && (
                                <div>
                                    <h3 style={{fontSize:11,color:'#6060a0',marginBottom:11}}>Languages</h3>
                                    {cv.languages.map((lang, i) => (
                                        <div key={lang.id} className="card">
                                            <input className="inp" placeholder="Language" value={lang.language} onChange={e => patch(`languages.${i}.language`, e.target.value)} />
                                            <input className="inp" placeholder="Level (e.g., Fluent, Native)" value={lang.level} onChange={e => patch(`languages.${i}.level`, e.target.value)} />
                                            <button className="btn btn-danger" onClick={() => removeItem('languages', lang.id)}>Remove</button>
                                        </div>
                                    ))}
                                    <button className="btn btn-primary" onClick={() => addItem('languages')}>+ Add Language</button>
                                </div>
                            )}
                            {tab === 'awards' && (
                                <div>
                                    <h3 style={{fontSize:11,color:'#6060a0',marginBottom:11}}>Awards</h3>
                                    {cv.awards.map((award, i) => (
                                        <div key={award.id} className="card">
                                            <input className="inp" placeholder="Award Title" value={award.title} onChange={e => patch(`awards.${i}.title`, e.target.value)} />
                                            <input className="inp" placeholder="Issuer" value={award.issuer} onChange={e => patch(`awards.${i}.issuer`, e.target.value)} />
                                            <input className="inp" placeholder="Date" value={award.date} onChange={e => patch(`awards.${i}.date`, e.target.value)} />
                                            <button className="btn btn-danger" onClick={() => removeItem('awards', award.id)}>Remove</button>
                                        </div>
                                    ))}
                                    <button className="btn btn-primary" onClick={() => addItem('awards')}>+ Add Award</button>
                                </div>
                            )}
                        </div>
                        {showPreview && (
                            <div className="preview">
                                <div style={{textAlign:'center',marginBottom:11}}>
                                    <div style={{fontSize:17,fontWeight:700}}>{cv.personal.name || 'Your Name'}</div>
                                    {cv.personal.title && <div style={{fontSize:11,color:'#4a3aaa',marginTop:2}}>{cv.personal.title}</div>}
                                    <div style={{fontSize:9.5,color:'#666',marginTop:4,display:'flex',justifyContent:'center',gap:9,flexWrap:'wrap'}}>
                                        {[cv.personal.email,cv.personal.phone,cv.personal.location,cv.personal.linkedin,cv.personal.github].filter(Boolean).map((c,i)=><span key={i}>{c}</span>)}
                                    </div>
                                </div>
                                {cv.personal.summary && <><div style={{fontSize:9.5,fontWeight:700,color:'#4a3aaa',borderBottom:'1.5px solid #4a3aaa',paddingBottom:2,marginBottom:7}}>PROFILE</div><div style={{fontSize:10.5,marginBottom:15}}>{cv.personal.summary}</div></>}
                                {cv.experience.length > 0 && <><div style={{fontSize:9.5,fontWeight:700,color:'#4a3aaa',borderBottom:'1.5px solid #4a3aaa',paddingBottom:2,marginBottom:7}}>EXPERIENCE</div>{cv.experience.map(e => (<div key={e.id} style={{marginBottom:8}}><div style={{fontWeight:600,fontSize:11}}>{e.role || 'Role'}</div><div style={{fontSize:10,color:'#4a3aaa'}}>{e.company}{e.location ? ` · ${e.location}` : ''}</div><div style={{fontSize:9.5,color:'#666'}}>{e.start}{e.start && e.end ? ' – ' : ''}{e.end}</div></div>))}</>}
                                {[...cv.skills.technical,...cv.skills.tools,...cv.skills.soft].length > 0 && <><div style={{fontSize:9.5,fontWeight:700,color:'#4a3aaa',borderBottom:'1.5px solid #4a3aaa',paddingBottom:2,marginBottom:7,marginTop:13}}>SKILLS</div><div style={{fontSize:10.5}}>{[...cv.skills.technical,...cv.skills.tools,...cv.skills.soft].join(', ')}</div></>}
                                {cv.education.length > 0 && <><div style={{fontSize:9.5,fontWeight:700,color:'#4a3aaa',borderBottom:'1.5px solid #4a3aaa',paddingBottom:2,marginBottom:7,marginTop:13}}>EDUCATION</div>{cv.education.map(e => (<div key={e.id} style={{marginBottom:7}}><div style={{fontWeight:600,fontSize:11}}>{e.degree}{e.field ? ` in ${e.field}` : ''}</div><div style={{fontSize:10,color:'#4a3aaa'}}>{e.institution}{e.grade ? ` · ${e.grade}` : ''}</div></div>))}</>}
                                {cv.languages.length > 0 && <><div style={{fontSize:9.5,fontWeight:700,color:'#4a3aaa',borderBottom:'1.5px solid #4a3aaa',paddingBottom:2,marginBottom:7,marginTop:13}}>LANGUAGES</div><div style={{fontSize:10.5}}>{cv.languages.map(l => `${l.language}${l.level ? ` (${l.level})` : ''}`).join(' · ')}</div></>}
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<CVStudio />);
    </script>
</body>
</html>
