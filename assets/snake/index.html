<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Snake Game</title>
    <link rel="icon" href="../../assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #0d0d14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Fira Code', monospace;
            color: #e0e0f0;
        }
        .header {
            margin-bottom: 1rem;
            text-align: center;
        }
        .header a {
            color: #7c5cfc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .header a:hover { text-decoration: underline; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #7c5cfc; }
        .score {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        #game {
            background: #161622;
            border: 2px solid #2a2a40;
            border-radius: 4px;
            display: block;
        }
        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background: #1e1e30;
            border: 1px solid #3a3a50;
            color: #e0e0f0;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        button:hover {
            background: #2a2a40;
            border-color: #7c5cfc;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(13, 13, 20, 0.95);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #7c5cfc;
            text-align: center;
            display: none;
        }
        .game-over.show { display: block; }
        .game-over h2 { color: #ff5555; margin-bottom: 0.5rem; }
        .game-over p { margin-bottom: 1rem; color: #8a8aa0; }
        .container { position: relative; }
    </style>
</head>
<body>
    <div class="header">
        <a href="../../index.html">← Back to Site</a>
        <h1>🐍 Snake</h1>
    </div>
    <div class="score">Score: <span id="score">0</span> | High: <span id="high">0</span></div>
    <div class="container">
        <canvas id="game" width="400" height="400"></canvas>
        <div class="game-over" id="gameOver">
            <h2>Game Over!</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>
    <div class="controls">
        <button onclick="toggleSpeed()" id="speedBtn">Speed: Normal</button>
        <button onclick="toggleWrap()">Wall Wrap: OFF</button>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = 20;
        
        let score = 0;
        let highScore = localStorage.getItem('snakeHigh') || 0;
        document.getElementById('high').textContent = highScore;
        
        let x = 10, y = 10;
        let dx = 0, dy = 0;
        let trail = [];
        let tail = 5;
        let appleX = 15, appleY = 15;
        let speed = 100;
        let gameInterval;
        let wrap = false;
        
        function start() {
            gameInterval = setInterval(game, speed);
        }
        
        function game() {
            x += dx;
            y += dy;
            
            if (wrap) {
                if (x < 0) x = tileCount - 1;
                if (x >= tileCount) x = 0;
                if (y < 0) y = tileCount - 1;
                if (y >= tileCount) y = 0;
            } else {
                if (x < 0 || x >= tileCount || y < 0 || y >= tileCount) {
                    gameOver();
                    return;
                }
            }
            
            ctx.fillStyle = '#161622';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#7c5cfc';
            for (let i = 0; i < trail.length; i++) {
                ctx.fillRect(trail[i].x * gridSize, trail[i].y * gridSize, gridSize - 2, gridSize - 2);
            }
            
            trail.push({ x, y });
            while (trail.length > tail) {
                trail.shift();
            }
            
            if (x === appleX && y === appleY) {
                tail++;
                score += 10;
                document.getElementById('score').textContent = score;
                appleX = Math.floor(Math.random() * tileCount);
                appleY = Math.floor(Math.random() * tileCount);
            }
            
            ctx.fillStyle = '#ff5555';
            ctx.fillRect(appleX * gridSize, appleY * gridSize, gridSize - 2, gridSize - 2);
        }
        
        function gameOver() {
            clearInterval(gameInterval);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHigh', highScore);
                document.getElementById('high').textContent = highScore;
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
        }
        
        function resetGame() {
            x = 10; y = 10;
            dx = 0; dy = 0;
            tail = 5;
            score = 0;
            trail = [];
            document.getElementById('score').textContent = score;
            document.getElementById('gameOver').classList.remove('show');
            start();
        }
        
        function toggleSpeed() {
            clearInterval(gameInterval);
            if (speed === 100) {
                speed = 60;
                document.getElementById('speedBtn').textContent = 'Speed: Fast';
            } else if (speed === 60) {
                speed = 150;
                document.getElementById('speedBtn').textContent = 'Speed: Slow';
            } else {
                speed = 100;
                document.getElementById('speedBtn').textContent = 'Speed: Normal';
            }
            start();
        }
        
        function toggleWrap() {
            wrap = !wrap;
            event.target.textContent = 'Wall Wrap: ' + (wrap ? 'ON' : 'OFF');
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' && dx !== 1) { dx = -1; dy = 0; }
            else if (e.key === 'ArrowRight' && dx !== -1) { dx = 1; dy = 0; }
            else if (e.key === 'ArrowUp' && dy !== 1) { dx = 0; dy = -1; }
            else if (e.key === 'ArrowDown' && dy !== -1) { dx = 0; dy = 1; }
        });
        
        start();
    </script>
</body>
</html>
