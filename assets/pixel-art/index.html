<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pixel Art Editor</title>
    <link rel="icon" href="../../assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #0d0d14;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Fira Code', monospace;
            color: #e0e0f0;
            padding: 1rem;
        }
        .header {
            margin-bottom: 1rem;
            text-align: center;
        }
        .header a {
            color: #7c5cfc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .header a:hover { text-decoration: underline; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #7c5cfc; }
        
        .container {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 100%;
        }
        
        .toolbar {
            background: #161622;
            border: 1px solid #2a2a40;
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .colors {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.25rem;
        }
        
        .color-btn {
            width: 28px;
            height: 28px;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
        }
        .color-btn.active { border-color: #fff; }
        
        .tools {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .tool-btn {
            background: #1e1e30;
            border: 1px solid #3a3a50;
            border-radius: 4px;
            padding: 0.5rem;
            color: #e0e0f0;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: left;
        }
        .tool-btn:hover { border-color: #7c5cfc; }
        .tool-btn.active { background: #7c5cfc; color: #000; }
        
        .size-select {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .size-select label { font-size: 0.8rem; color: #8a8aa0; }
        .size-select select {
            background: #1e1e30;
            border: 1px solid #3a3a50;
            border-radius: 4px;
            padding: 0.5rem;
            color: #e0e0f0;
            font-family: inherit;
        }
        
        canvas {
            background: #fff;
            image-rendering: pixelated;
            cursor: crosshair;
        }
        
        .actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .action-btn {
            background: #1e1e30;
            border: 1px solid #3a3a50;
            border-radius: 4px;
            padding: 0.5rem 1rem;
            color: #e0e0f0;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .action-btn:hover { border-color: #7c5cfc; }
        .action-btn.primary { background: #7c5cfc; color: #000; border: none; }
        .action-btn.primary:hover { background: #9585ff; }
    </style>
</head>
<body>
    <div class="header">
        <a href="../../index.html">← Back to Site</a>
        <h1>🎮 Pixel Art Editor</h1>
    </div>
    <div class="container">
        <div class="toolbar">
            <div>
                <div style="font-size: 0.8rem; color: #8a8aa0; margin-bottom: 0.5rem;">Colors</div>
                <div class="colors" id="colorPalette"></div>
            </div>
            
            <div class="size-select">
                <label>Canvas Size</label>
                <select id="canvasSize">
                    <option value="8">8 x 8</option>
                    <option value="16" selected>16 x 16</option>
                    <option value="32">32 x 32</option>
                    <option value="64">64 x 64</option>
                </select>
            </div>
            
            <div class="tools">
                <button class="tool-btn active" onclick="setTool('draw')">✏️ Draw</button>
                <button class="tool-btn" onclick="setTool('erase')">🧹 Erase</button>
                <button class="tool-btn" onclick="setTool('fill')">🪣 Fill</button>
            </div>
            
            <div class="actions">
                <button class="action-btn primary" onclick="downloadPNG()">Download PNG</button>
                <button class="action-btn" onclick="clearCanvas()">Clear</button>
            </div>
        </div>
        
        <canvas id="canvas" width="384" height="384"></canvas>
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const palette = document.getElementById('colorPalette');
        
        let size = 16;
        let scale = 24;
        let currentColor = '#000000';
        let currentTool = 'draw';
        let isDrawing = false;
        
        const colors = [
            '#000000', '#ffffff', '#ff0000', '#00ff00',
            '#0000ff', '#ffff00', '#ff00ff', '#00ffff',
            '#888888', '#ff8888', '#88ff88', '#8888ff',
            '#7c5cfc', '#ff5555', '#55ff55', '#ffdd55'
        ];
        
        function init() {
            renderPalette();
            resizeCanvas();
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDraw);
            canvas.addEventListener('mouseleave', stopDraw);
            
            document.getElementById('canvasSize').addEventListener('change', resizeCanvas);
        }
        
        function renderPalette() {
            palette.innerHTML = colors.map(c => `
                <button class="color-btn ${c === currentColor ? 'active' : ''}" 
                    style="background: ${c};" onclick="setColor('${c}')"></button>
            `).join('');
        }
        
        function setColor(c) {
            currentColor = c;
            renderPalette();
            if (currentTool === 'erase') setTool('draw');
        }
        
        function setTool(t) {
            currentTool = t;
            document.querySelectorAll('.tool-btn').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(t));
            });
        }
        
        function resizeCanvas() {
            size = parseInt(document.getElementById('canvasSize').value);
            scale = Math.floor(384 / size);
            canvas.width = size;
            canvas.height = size;
            ctx.imageSmoothingEnabled = false;
            clearCanvas();
        }
        
        function clearCanvas() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);
        }
        
        function startDraw(e) {
            isDrawing = true;
            draw(e);
        }
        
        function stopDraw() {
            isDrawing = false;
        }
        
        function draw(e) {
            if (!isDrawing && e.type !== 'click') return;
            
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);
            
            if (x < 0 || x >= size || y < 0 || y >= size) return;
            
            if (currentTool === 'draw') {
                ctx.fillStyle = currentColor;
                ctx.fillRect(x, y, 1, 1);
            } else if (currentTool === 'erase') {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(x, y, 1, 1);
            } else if (currentTool === 'fill') {
                floodFill(x, y, currentColor);
            }
        }
        
        function floodFill(x, y, color) {
            const imageData = ctx.getImageData(0, 0, size, size);
            const data = imageData.data;
            const targetColor = getPixel(x, y);
            
            if (targetColor === color) return;
            
            const stack = [[x, y]];
            while (stack.length) {
                const [cx, cy] = stack.pop();
                if (cx < 0 || cx >= size || cy < 0 || cy >= size) continue;
                if (getPixel(cx, cy) !== targetColor) continue;
                
                setPixel(cx, cy, color);
                stack.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
            }
            
            ctx.putImageData(imageData, 0, 0);
        }
        
        function getPixel(x, y) {
            const data = ctx.getImageData(x, y, 1, 1).data;
            return '#' + [data[0], data[1], data[2]].map(v => v.toString(16).padStart(2, '0')).join('');
        }
        
        function setPixel(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
        }
        
        function downloadPNG() {
            const link = document.createElement('a');
            link.download = 'pixel-art.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        init();
    </script>
</body>
</html>
