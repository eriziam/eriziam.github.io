<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flappy Bird Clone</title>
    <link rel="icon" href="../../assets/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: #0d0d14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Fira Code', monospace;
            color: #e0e0f0;
            overflow: hidden;
        }
        .header {
            margin-bottom: 1rem;
            text-align: center;
        }
        .header a {
            color: #7c5cfc;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .header a:hover { text-decoration: underline; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #7c5cfc; }
        .score {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        #game {
            background: linear-gradient(180deg, #1a1a2e 0%, #16162a 100%);
            border: 2px solid #2a2a40;
            border-radius: 4px;
            display: block;
        }
        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
        }
        button {
            background: #1e1e30;
            border: 1px solid #3a3a50;
            color: #e0e0f0;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        button:hover {
            background: #2a2a40;
            border-color: #7c5cfc;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="../../index.html">← Back to Site</a>
        <h1>🐦 Flappy Bird</h1>
    </div>
    <div class="score">Score: <span id="score">0</span> | Best: <span id="best">0</span></div>
    <canvas id="game" width="320" height="480"></canvas>
    <div class="controls">
        <button onclick="resetGame()">Reset</button>
        <button onclick="toggleDifficulty()" id="diffBtn">Difficulty: Normal</button>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let score = 0;
        let best = localStorage.getItem('flappyBest') || 0;
        document.getElementById('best').textContent = best;
        
        let bird = { x: 50, y: 200, velocity: 0, radius: 12 };
        let pipes = [];
        let gameRunning = false;
        let difficulty = 3;
        
        function resetGame() {
            bird = { x: 50, y: 200, velocity: 0, radius: 12 };
            pipes = [];
            score = 0;
            document.getElementById('score').textContent = score;
            gameRunning = true;
            loop();
        }
        
        function toggleDifficulty() {
            if (difficulty === 3) difficulty = 5;
            else if (difficulty === 5) difficulty = 2;
            else difficulty = 3;
            
            const names = { 2: 'Easy', 3: 'Normal', 5: 'Hard' };
            document.getElementById('diffBtn').textContent = 'Difficulty: ' + names[difficulty];
        }
        
        function loop() {
            if (!gameRunning) return;
            
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        function update() {
            bird.velocity += 0.5;
            bird.y += bird.velocity;
            
            if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
                gameOver();
                return;
            }
            
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 150) {
                pipes.push({
                    x: canvas.width,
                    top: Math.random() * (canvas.height - 150) + 50,
                    gap: 120
                });
            }
            
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= difficulty;
                
                if (pipes[i].x + 50 < 0) {
                    pipes.splice(i, 1);
                    score++;
                    document.getElementById('score').textContent = score;
                    continue;
                }
                
                if (bird.x + bird.radius > pipes[i].x && bird.x - bird.radius < pipes[i].x + 50) {
                    if (bird.y - bird.radius < pipes[i].top || bird.y + bird.radius > pipes[i].top + pipes[i].gap) {
                        gameOver();
                    }
                }
            }
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#7c5cfc';
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#55ff55';
            for (let pipe of pipes) {
                ctx.fillRect(pipe.x, 0, 50, pipe.top);
                ctx.fillRect(pipe.x, pipe.top + pipe.gap, 50, canvas.height - pipe.top - pipe.gap);
            }
        }
        
        function gameOver() {
            gameRunning = false;
            if (score > best) {
                best = score;
                localStorage.setItem('flappyBest', best);
                document.getElementById('best').textContent = best;
            }
            setTimeout(resetGame, 1000);
        }
        
        canvas.addEventListener('click', () => {
            if (!gameRunning) {
                resetGame();
            } else {
                bird.velocity = -8;
            }
        });
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (!gameRunning) resetGame();
                else bird.velocity = -8;
            }
        });
        
        resetGame();
    </script>
</body>
</html>
